<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MITZII HUB | ELITE HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Plus+Jakarta+Sans:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00d4ff;
            --bg: #020202;
            --surface: rgba(20, 20, 20, 0.6);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; }

        /* Moving Cyber Background */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; opacity: 0.5; }

        /* Top Dashboard */
        .dashboard {
            display: flex; justify-content: space-between; padding: 15px 5%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
        }
        .dash-info { font-family: 'Orbitron', sans-serif; font-size: 11px; color: var(--accent); letter-spacing: 1px; }

        /* Header */
        header { text-align: center; padding: 60px 20px; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 3rem; font-weight: 800; text-shadow: 0 0 20px rgba(0,212,255,0.4); }
        .logo span { color: var(--accent); }

        /* Main Grid */
        .container { max-width: 1100px; margin: auto; padding: 0 20px; }
        .add-btn-box { display: flex; justify-content: center; margin-bottom: 50px; }
        .btn-elite {
            padding: 16px 45px; border-radius: 50px; background: var(--accent);
            color: #000; border: none; font-weight: 800; cursor: pointer;
            transition: 0.3s; box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }
        .btn-elite:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0, 212, 255, 0.5); }

        .group-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 25px;
            padding: 30px; backdrop-filter: blur(15px); position: relative;
            transition: 0.4s; animation: fadeInUp 0.6s ease forwards;
        }
        .card:hover { border-color: var(--accent); transform: scale(1.02); background: rgba(30, 30, 30, 0.6); }

        .card-img { width: 70px; height: 70px; border-radius: 20px; object-fit: cover; margin-bottom: 20px; border: 2px solid var(--border); }
        .card h3 { font-size: 22px; margin-bottom: 10px; font-weight: 800; }
        .card p { font-size: 14px; color: #999; margin-bottom: 25px; height: 45px; overflow: hidden; }
        
        .join-link { display: block; text-align: center; padding: 12px; background: #111; color: #fff; text-decoration: none; border-radius: 12px; font-weight: 700; border: 1px solid #222; }
        .join-link:hover { border-color: var(--accent); color: var(--accent); }

        .delete-icon { position: absolute; top: 20px; right: 20px; color: #444; cursor: pointer; font-size: 20px; }
        .delete-icon:hover { color: #ff4757; }

        /* Floating Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: #111; padding: 40px; border-radius: 30px; width: 90%; max-width: 500px; border: 1px solid var(--accent); }
        input, select, textarea { width: 100%; padding: 15px; margin-bottom: 15px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 12px; outline: none; }

        /* Audio Player Dock */
        .music-player { position: fixed; bottom: 30px; left: 30px; background: rgba(0,0,0,0.8); border: 1px solid var(--border); padding: 12px 25px; border-radius: 100px; display: flex; align-items: center; gap: 15px; }
        .play-pause { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; color: #000; font-size: 20px; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onclick="handleFirstClick()">

    <canvas id="bg-canvas"></canvas>

    <div class="dashboard">
        <div>
            <span class="dash-info">LATENCY: <span id="ping">--</span></span>
            <span class="dash-info" style="margin-left: 20px;">CLOCK: <span id="clock">00:00</span></span>
        </div>
        <span class="dash-info">DEV: MITZII</span>
    </div>

    <header>
        <div class="logo">MITZII <span>HUB</span></div>
    </header>

    <div class="container">
        <div class="add-btn-box">
            <button class="btn-elite" onclick="toggleModal(true)">+ ADD NEW COMMUNITY</button>
        </div>

        <div class="group-grid" id="main-grid"></div>
        
        <div style="text-align: center; margin: 60px 0; font-size: 11px; color: #333; letter-spacing: 2px;">
            DESIGNED BY DEV MITZII | ALL RIGHTS RESERVED 2026
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 25px; font-family: 'Orbitron'; color: var(--accent);">SUBMIT GROUP</h2>
            <input type="text" id="group-name" placeholder="Name">
            <input type="url" id="group-link" placeholder="Invite Link">
            <label style="font-size: 11px; color: #666; margin-bottom: 5px; display: block;">Upload Image from Gallery:</label>
            <input type="file" id="group-img-file" accept="image/*">
            <select id="group-cat">
                <option>CHAT GROUP</option>
                <option>ENTERTAINMENT</option>
                <option>TECHNOLOGY</option>
                <option>MOVIES</option>
            </select>
            <textarea id="group-desc" placeholder="Rules & Short Info..."></textarea>
            <button class="btn-elite" style="width: 100%;" onclick="saveNewGroup()">PUBLISH NOW</button>
            <button onclick="toggleModal(false)" style="background:none; border:none; color:#444; width:100%; margin-top:15px; cursor:pointer;">CANCEL</button>
        </div>
    </div>

    <div class="music-player">
        <button class="play-pause" onclick="toggleMusic()" id="p-toggle">▶</button>
        <div style="font-size: 11px;">
            <div style="font-weight: 800; color: var(--accent);">SINHALA MIX</div>
            <div id="m-status">SYNCING...</div>
        </div>
    </div>

    <audio id="bg-audio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        // 1. CYBER ANIMATION (Electric Rain)
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let lines = [];

        function initBG() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            lines = Array.from({length: 40}, () => ({x: Math.random()*canvas.width, y: Math.random()*canvas.height, v: Math.random()*1+0.5, l: Math.random()*50+20}));
        }
        function drawBG() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.strokeStyle = "rgba(0, 212, 255, 0.2)";
            ctx.lineWidth = 1;
            lines.forEach(l => {
                ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(l.x, l.y + l.l); ctx.stroke();
                l.y += l.v; if(l.y > canvas.height) l.y = -l.l;
            });
            requestAnimationFrame(drawBG);
        }
        initBG(); drawBG(); window.onresize = initBG;

        // 2. DATA MANAGEMENT (CRUD + Gallery)
        let db = JSON.parse(localStorage.getItem('mitzii_v2')) || [];

        function saveNewGroup() {
            const file = document.getElementById('group-img-file').files[0];
            const reader = new FileReader();

            const pushToDB = (imgData) => {
                const newEntry = {
                    name: document.getElementById('group-name').value,
                    link: document.getElementById('group-link').value,
                    cat: document.getElementById('group-cat').value,
                    desc: document.getElementById('group-desc').value,
                    img: imgData || 'https://cdn-icons-png.flaticon.com/512/124/124034.png'
                };
                if(!newEntry.name || !newEntry.link) return alert("Fill Name and Link!");
                db.unshift(newEntry);
                localStorage.setItem('mitzii_v2', JSON.stringify(db));
                render(); toggleModal(false);
            };

            if(file) {
                reader.readAsDataURL(file);
                reader.onload = () => pushToDB(reader.result);
            } else {
                pushToDB();
            }
        }

        function render() {
            document.getElementById('main-grid').innerHTML = db.map((g, i) => `
                <div class="card">
                    <span class="delete-icon" onclick="removeGroup(${i})">×</span>
                    <img src="${g.img}" class="card-img">
                    <div style="font-size: 10px; color: var(--accent); font-weight: 800; margin-bottom:5px;">${g.cat}</div>
                    <h3>${g.name}</h3>
                    <p>${g.desc}</p>
                    <a href="${g.link}" class="join-link" target="_blank">JOIN COMMUNITY</a>
                </div>
            `).join('');
        }

        function removeGroup(i) { db.splice(i, 1); localStorage.setItem('mitzii_v2', JSON.stringify(db)); render(); }
        function toggleModal(s) { document.getElementById('modal').style.display = s ? 'flex' : 'none'; }

        // 3. AUDIO & INTERACTIVE
        const audio = document.getElementById('bg-audio');
        let started = false;

        function handleFirstClick() {
            if(!started) {
                audio.play();
                document.getElementById('p-toggle').innerText = "⏸";
                document.getElementById('m-status').innerText = "NOW STREAMING";
                started = true;
            }
        }

        function toggleMusic() {
            if(audio.paused) { audio.play(); document.getElementById('p-toggle').innerText = "⏸"; }
            else { audio.pause(); document.getElementById('p-toggle').innerText = "▶"; }
        }

        setInterval(() => {
            const d = new Date();
            document.getElementById('clock').innerText = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
            document.getElementById('ping').innerText = Math.floor(Math.random()*25+10) + "ms";
        }, 1000);

        render();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MITZII HUB | Advanced Group Directory</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007aff;
            --primary-glow: rgba(0, 122, 255, 0.2);
            --bg: #ffffff;
            --text: #1d1d1f;
            --card: #f5f5f7;
            --border: #d2d2d7;
            --glass: rgba(255, 255, 255, 0.8);
        }

        [data-theme="dark"] {
            --bg: #000000;
            --text: #f5f5f7;
            --card: #1c1c1e;
            --border: #38383a;
            --glass: rgba(28, 28, 30, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); transition: 0.5s; overflow-x: hidden; }

        /* --- 1. Premium Live Animation Background --- */
        #mesh-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.7; }

        /* --- Navigation Bar --- */
        nav { 
            padding: 15px 6%; background: var(--glass); backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;
            align-items: center; position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 700; color: var(--text); text-decoration: none; }
        .logo span { color: var(--primary); }

        /* --- Main Form Section (GroupSor Inspired) --- */
        .container { max-width: 800px; margin: 50px auto; padding: 0 20px; }
        .form-card { 
            background: var(--card); padding: 40px; border-radius: 30px; 
            border: 1px solid var(--border); box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            animation: fadeInUp 0.8s ease-out;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        h2 { margin-bottom: 30px; font-weight: 700; font-size: 28px; text-align: center; font-family: 'Space Grotesk', sans-serif; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; font-weight: 600; font-size: 14px; color: var(--text); }
        
        input, select, textarea {
            width: 100%; padding: 16px; border-radius: 14px; border: 1px solid var(--border);
            background: var(--bg); color: var(--text); outline: none; transition: 0.3s; font-size: 15px;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-glow); }

        .btn-submit {
            background: var(--primary); color: white; width: 100%; padding: 18px;
            border-radius: 16px; border: none; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s;
            margin-top: 10px;
        }
        .btn-submit:hover { transform: scale(1.02); box-shadow: 0 10px 20px var(--primary-glow); }

        /* --- Notice Box --- */
        .notice-box {
            margin-top: 30px; padding: 20px; border-radius: 15px;
            background: rgba(0, 122, 255, 0.08); border-left: 5px solid var(--primary);
            font-size: 13px; color: var(--text); line-height: 1.6;
        }

        /* --- Audio Controls --- */
        .audio-player { position: fixed; bottom: 25px; left: 25px; z-index: 1000; }
        .music-toggle {
            background: var(--primary); color: white; width: 45px; height: 45px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 8px 15px rgba(0,0,0,0.2); font-size: 18px;
        }

        @media (max-width: 600px) { .form-card { padding: 25px; } h2 { font-size: 22px; } }
    </style>
</head>
<body onclick="initAudio()">

    <canvas id="mesh-canvas"></canvas>

    <nav>
        <a href="#" class="logo">MITZII <span>HUB</span></a>
        <div style="display: flex; gap: 20px; align-items: center;">
            <span onclick="toggleTheme()" style="cursor:pointer; font-size: 14px; font-weight: 700;">🌗 Mode</span>
        </div>
    </nav>

    <div class="container">
        <div class="form-card">
            <h2>Add Your WhatsApp Group</h2>
            <form id="group-form">
                
                <div class="form-group">
                    <label>Enter WhatsApp Group Invite Link...</label>
                    <input type="url" placeholder="https://chat.whatsapp.com/..." required>
                    <small style="font-size: 11px; color: #86868b; margin-top: 5px; display: block;">Ex:- https://chat.whatsapp.com/CluEPPD7DuiEkai8nxFIZP</small>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Select Group Category</label>
                        <select required>
                            <option value="">Any Category</option>
                            <option>Film/Animation</option>
                            <option>Gaming/Apps</option>
                            <option>Entertainment</option>
                            <option>Education</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Select Group Country</label>
                        <select required>
                            <option value="">Any Country</option>
                            <option>Sri Lanka</option>
                            <option>Global</option>
                            <option>United States</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Select Group Language</label>
                    <select required>
                        <option value="">Any Language</option>
                        <option>Sinhala</option>
                        <option>English</option>
                        <option>Swedish</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Enter Tags by Comma (,) Separated (Optional)</label>
                    <input type="text" placeholder="Ex:- Funny, Jokes, City, State">
                </div>

                <div class="form-group">
                    <label>Enter Group Information and Rules (Optional)</label>
                    <textarea rows="4" placeholder="Description length (Up to 1000 Words)"></textarea>
                </div>

                <button type="submit" class="btn-submit">Submit Group</button>

                <div class="notice-box">
                    <b>Important Note:</b> Your group will be visible to the public world wide (Everyone). By submitting, you agree to our <u>Rules for Group Publisher</u>. වැරදි තොරතුරු ඇතුළත් කිරීමෙන් වළකින්න.
                </div>
            </form>
        </div>
    </div>

    <audio id="bg-audio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>
    <div class="audio-player">
        <div class="music-toggle" id="m-btn" onclick="controlMusic()">🔇</div>
    </div>

    <script>
        // 1. Live Mesh Animation
        const canvas = document.getElementById('mesh-canvas');
        const ctx = canvas.getContext('2d');
        let atoms = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Atom {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.r = Math.random() * 150 + 50;
                this.dx = (Math.random() - 0.5) * 0.8;
                this.dy = (Math.random() - 0.5) * 0.8;
                this.color = Math.random() > 0.5 ? 'rgba(0,122,255,0.1)' : 'rgba(236,72,153,0.08)';
            }
            update() {
                this.x += this.dx; this.y += this.dy;
                if(this.x < 0 || this.x > canvas.width) this.dx *= -1;
                if(this.y < 0 || this.y > canvas.height) this.dy *= -1;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
                ctx.fillStyle = this.color; ctx.fill();
            }
        }

        function init() {
            resize();
            atoms = Array.from({length: 8}, () => new Atom());
        }

        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            atoms.forEach(a => { a.update(); a.draw(); });
            requestAnimationFrame(animate);
        }
        init(); animate();
        window.onresize = resize;

        // 2. Music Control Logic (Auto-play workaround)
        const audio = document.getElementById('bg-audio');
        let audioStarted = false;

        function initAudio() {
            if (!audioStarted) {
                audio.play();
                audioStarted = true;
                document.getElementById('m-btn').innerText = "🔊";
            }
        }

        function controlMusic() {
            if (audio.paused) {
                audio.play();
                document.getElementById('m-btn').innerText = "🔊";
            } else {
                audio.pause();
                document.getElementById('m-btn').innerText = "🔇";
            }
        }

        // 3. Theme Toggle
        function toggleTheme() {
            const body = document.body;
            body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MITZII HUB | ELITE HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #0084ff;
            --bg: #000000;
            --card: rgba(18, 18, 18, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; }

        /* --- 1. PREMIUM AMBIENT BACKGROUND --- */
        #canvas { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; }

        /* --- DASHBOARD --- */
        .dashboard {
            padding: 15px 5%; display: flex; justify-content: space-between;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); sticky; top: 0; z-index: 1000;
        }
        .dash-item { font-family: 'Orbitron', sans-serif; font-size: 10px; color: var(--accent); letter-spacing: 1px; }

        /* --- LOGO --- */
        header { text-align: center; padding: 50px 20px; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; font-weight: 700; letter-spacing: 2px; }
        .logo span { color: var(--accent); }

        /* --- MAIN UI --- */
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .action-bar { display: flex; justify-content: center; margin-bottom: 40px; }

        .btn-elite {
            padding: 15px 40px; border-radius: 12px; background: var(--accent);
            color: white; border: none; font-weight: 800; cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 132, 255, 0.4); transition: 0.3s;
        }
        .btn-elite:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(0, 132, 255, 0.6); }

        /* --- GROUP CARDS --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .card {
            background: var(--card); border: 1px solid var(--border); border-radius: 24px;
            padding: 25px; position: relative; backdrop-filter: blur(10px);
            transition: 0.4s ease; animation: fadeInUp 0.6s ease forwards;
        }
        .card:hover { border-color: var(--accent); transform: scale(1.03); background: rgba(25, 25, 25, 0.8); }

        .group-thumb { width: 65px; height: 65px; border-radius: 18px; object-fit: cover; margin-bottom: 15px; border: 2px solid var(--border); }
        .card h3 { margin-bottom: 8px; font-size: 20px; font-weight: 800; }
        .card p { font-size: 13px; color: #999; margin-bottom: 20px; line-height: 1.5; height: 40px; overflow: hidden; }
        
        .join-btn { display: block; text-align: center; padding: 12px; background: #1a1a1a; color: white; text-decoration: none; border-radius: 12px; font-weight: 700; font-size: 13px; border: 1px solid #333; }
        .join-btn:hover { border-color: var(--accent); color: var(--accent); }

        .del-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; color: #444; font-size: 20px; cursor: pointer; }
        .del-btn:hover { color: #ff4757; }

        /* --- MODAL --- */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-box { background: #111; padding: 35px; border-radius: 30px; width: 90%; max-width: 480px; border: 1px solid var(--accent); }
        input, select, textarea { width: 100%; padding: 15px; margin-bottom: 15px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 12px; outline: none; }
        
        /* --- MUSIC PLAYER --- */
        .player { position: fixed; bottom: 30px; left: 30px; background: rgba(0,0,0,0.85); border: 1px solid var(--border); padding: 10px 20px; border-radius: 50px; display: flex; align-items: center; gap: 15px; }
        .play-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; color: white; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onclick="startMusic()">

    <canvas id="canvas"></canvas>

    <div class="dashboard">
        <div>
            <span class="dash-item">PING: <span id="ping">--</span></span>
            <span class="dash-item" style="margin-left: 20px;">CLOCK: <span id="time">00:00</span></span>
        </div>
        <span class="dash-item">USER: DEV MITZII</span>
    </div>

    <header>
        <div class="logo">MITZII <span>HUB</span></div>
    </header>

    <div class="container">
        <div class="action-bar">
            <button class="btn-elite" onclick="toggleModal(true)">+ ADD NEW COMMUNITY</button>
        </div>

        <div class="grid" id="group-grid"></div>
        
        <div style="text-align: center; margin-top: 50px; font-size: 11px; color: #444; border-top: 1px solid #111; padding-top: 20px;">
            NOTICE: UNAUTHORIZED LINKS WILL BE REMOVED AUTOMATICALLY. <br>POWERED BY MITZII DEV
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-box">
            <h2 style="margin-bottom: 20px; font-family: 'Orbitron';">SUBMIT GROUP</h2>
            <input type="text" id="m-name" placeholder="Community Name">
            <input type="url" id="m-link" placeholder="Invite Link">
            <label style="font-size: 12px; color: #666; display: block; margin-bottom: 5px;">Upload Gallery Photo:</label>
            <input type="file" id="m-img" accept="image/*" style="font-size: 12px;">
            <select id="m-cat">
                <option>CHAT GROUP</option>
                <option>ENTERTAINMENT</option>
                <option>TECHNOLOGY</option>
            </select>
            <textarea id="m-desc" placeholder="Brief info..."></textarea>
            <button class="btn-elite" style="width: 100%;" onclick="publishGroup()">PUBLISH NOW</button>
            <button onclick="toggleModal(false)" style="background:none; border:none; color:#555; width:100%; margin-top:15px; cursor:pointer;">CANCEL</button>
        </div>
    </div>

    <div class="player">
        <button class="play-btn" onclick="controlAudio()" id="p-btn">▶</button>
        <div style="font-size: 11px;">
            <div style="font-weight: 800; color: var(--accent);">SINHALA NEW MIX</div>
            <div id="m-status">CLICK TO SYNC</div>
        </div>
    </div>

    <audio id="bg-audio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        // 1. DYNAMIC BACKGROUND
        const cvs = document.getElementById('canvas');
        const ctx = cvs.getContext('2d');
        let parts = [];
        function initBG() {
            cvs.width = window.innerWidth; cvs.height = window.innerHeight;
            parts = Array.from({length: 40}, () => ({x: Math.random()*cvs.width, y: Math.random()*cvs.height, s: Math.random()*2, v: Math.random()*0.5}));
        }
        function drawBG() {
            ctx.clearRect(0,0,cvs.width, cvs.height); ctx.fillStyle = "rgba(0, 132, 255, 0.3)";
            parts.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill(); p.y -= p.v; if(p.y < 0) p.y = cvs.height; });
            requestAnimationFrame(drawBG);
        }
        initBG(); drawBG(); window.onresize = initBG;

        // 2. GROUP MANAGEMENT (with Gallery Upload)
        let storage = JSON.parse(localStorage.getItem('mitzii_data')) || [];

        function publishGroup() {
            const file = document.getElementById('m-img').files[0];
            const reader = new FileReader();

            const saveData = (imgBase64) => {
                const item = {
                    name: document.getElementById('m-name').value,
                    link: document.getElementById('m-link').value,
                    cat: document.getElementById('m-cat').value,
                    desc: document.getElementById('m-desc').value,
                    img: imgBase64 || 'https://cdn-icons-png.flaticon.com/512/124/124034.png'
                };
                storage.unshift(item);
                localStorage.setItem('mitzii_data', JSON.stringify(storage));
                render(); toggleModal(false);
            };

            if (file) {
                reader.readAsDataURL(file);
                reader.onload = () => saveData(reader.result);
            } else {
                saveData();
            }
        }

        function render() {
            document.getElementById('group-grid').innerHTML = storage.map((g, i) => `
                <div class="card">
                    <button class="del-btn" onclick="remove(${i})">×</button>
                    <img src="${g.img}" class="group-thumb">
                    <div style="font-size: 10px; color: var(--accent); font-weight: 800;">${g.cat}</div>
                    <h3>${g.name}</h3>
                    <p>${g.desc}</p>
                    <a href="${g.link}" class="join-btn">JOIN NOW</a>
                </div>
            `).join('');
        }

        function remove(i) { storage.splice(i, 1); localStorage.setItem('mitzii_data', JSON.stringify(storage)); render(); }
        function toggleModal(s) { document.getElementById('modal').style.display = s ? 'flex' : 'none'; }

        // 3. AUDIO & DASHBOARD
        const audio = document.getElementById('bg-audio');
        let mStarted = false;
        function startMusic() { if(!mStarted) { audio.play(); document.getElementById('p-btn').innerText = "⏸"; document.getElementById('m-status').innerText = "STREAMING..."; mStarted = true; } }
        function controlAudio() { if(audio.paused) { audio.play(); document.getElementById('p-btn').innerText = "⏸"; } else { audio.pause(); document.getElementById('p-btn').innerText = "▶"; } }

        setInterval(() => {
            const d = new Date();
            document.getElementById('time').innerText = d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
            document.getElementById('ping').innerText = Math.floor(Math.random() * 20 + 15) + "ms";
        }, 1000);

        render();
    </script>
</body>
</html>

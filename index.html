<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MITZII HUB | ELITE HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Plus+Jakarta+Sans:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00d4ff;
            --bg: #020202;
            --surface: rgba(20, 20, 20, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; }

        /* Moving Cyber Grid Background */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; opacity: 0.3; }

        /* Dashboard */
        .dashboard {
            display: flex; justify-content: space-between; padding: 15px 5%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
        }
        .dash-info { font-family: 'Orbitron', sans-serif; font-size: 10px; color: var(--accent); letter-spacing: 1px; }

        /* Header */
        header { text-align: center; padding: 50px 20px; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 2.8rem; font-weight: 800; }
        .logo span { color: var(--accent); text-shadow: 0 0 15px var(--accent); }

        /* Main Actions */
        .container { max-width: 1200px; margin: auto; padding: 0 20px; }
        
        .action-grid { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 50px; 
        }

        .btn-elite {
            padding: 14px 28px; border-radius: 12px; background: var(--accent);
            color: #000; border: none; font-weight: 800; cursor: pointer;
            transition: 0.3s; font-size: 13px; text-transform: uppercase;
        }
        .btn-elite:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 212, 255, 0.4); }

        .btn-outline {
            background: transparent; border: 1px solid var(--border); color: #888;
        }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

        /* Group Cards */
        .group-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
            padding: 25px; position: relative; backdrop-filter: blur(15px);
            transition: 0.4s; animation: fadeInUp 0.5s ease forwards;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }

        .card-img { width: 60px; height: 60px; border-radius: 15px; object-fit: cover; margin-bottom: 15px; border: 1px solid #333; }
        .card-tag { font-size: 9px; font-weight: 800; color: var(--accent); border: 1px solid var(--accent); padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 10px; }
        .card h3 { font-size: 18px; margin-bottom: 8px; }
        .card p { font-size: 12px; color: #777; margin-bottom: 20px; line-height: 1.4; height: 35px; overflow: hidden; }
        
        .join-link { display: block; text-align: center; padding: 10px; background: #1a1a1a; color: #fff; text-decoration: none; border-radius: 8px; font-weight: 700; font-size: 13px; border: 1px solid #333; }
        .join-link:hover { background: var(--accent); color: #000; }

        .delete-btn { position: absolute; top: 15px; right: 15px; color: #333; cursor: pointer; font-size: 18px; }
        .delete-btn:hover { color: #ff4757; }

        /* Modal Form */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-box { background: #0a0a0a; border: 1px solid var(--accent); padding: 35px; border-radius: 25px; width: 90%; max-width: 450px; }
        input, select, textarea { width: 100%; padding: 14px; margin-bottom: 12px; background: #151515; border: 1px solid #222; color: white; border-radius: 10px; outline: none; font-size: 13px; }
        
        /* Floating Footer Notice */
        .notice-bar { text-align: center; margin: 40px 0; font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 2px; }

        /* Music Dock */
        .music-dock { position: fixed; bottom: 25px; left: 25px; background: rgba(0,0,0,0.8); border: 1px solid var(--border); padding: 10px 20px; border-radius: 50px; display: flex; align-items: center; gap: 12px; }
        .m-play { width: 35px; height: 35px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; color: #000; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onclick="initExperience()">

    <canvas id="bg-canvas"></canvas>

    <div class="dashboard">
        <div>
            <span class="dash-info">PING: <span id="ping">--</span></span>
            <span class="dash-info" style="margin-left: 15px;">TIME: <span id="clock">00:00</span></span>
        </div>
        <span class="dash-info">MITZII SECURE</span>
    </div>

    <header>
        <div class="logo">MITZII <span>HUB</span></div>
    </header>

    <div class="container">
        <div class="action-grid">
            <button class="btn-elite" onclick="toggleModal(true)">+ Submit Group / Channel</button>
            <button class="btn-elite btn-outline" onclick="location.reload()">Refresh Data</button>
            <button class="btn-elite btn-outline" onclick="alert('Link Copied to Clipboard!')">Share Hub</button>
            <button class="btn-elite btn-outline" onclick="window.open('https://wa.me/yournumber', '_blank')">Contact Dev</button>
        </div>

        <div class="group-grid" id="main-grid"></div>
        
        <div class="notice-bar">
            Notice: All groups are monitored. No illegal content allowed. <br> Powered by Mitzii Elite V1
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-box">
            <h2 style="margin-bottom: 20px; font-family: 'Orbitron'; font-size: 18px;">SUBMIT GROUP / CHANNEL</h2>
            <input type="text" id="g-name" placeholder="Community Name">
            <input type="url" id="g-link" placeholder="Invite Link (WhatsApp/Telegram)">
            <label style="font-size: 10px; color: #555; display: block; margin-bottom: 5px;">Select Logo from Gallery:</label>
            <input type="file" id="g-file" accept="image/*">
            <select id="g-cat">
                <option value="CHAT GROUP">CHAT GROUP</option>
                <option value="ENTERTAINMENT">ENTERTAINMENT</option>
                <option value="TECHNOLOGY">TECHNOLOGY</option>
                <option value="MOVIES">MOVIES</option>
                <option value="OTHER">OTHER (Special Category)</option>
            </select>
            <textarea id="g-desc" placeholder="Brief rules or information..."></textarea>
            <button class="btn-elite" style="width: 100%;" onclick="publish()">PUBLISH NOW</button>
            <button onclick="toggleModal(false)" style="background:none; border:none; color:#444; width:100%; margin-top:10px; cursor:pointer; font-size: 12px;">CLOSE</button>
        </div>
    </div>

    <div class="music-dock">
        <button class="m-play" onclick="controlAudio()" id="m-btn">▶</button>
        <div style="font-size: 10px;">
            <div style="font-weight: 800; color: var(--accent);">SINHALA NEW RAP</div>
            <div id="m-status">CLICK TO START</div>
        </div>
    </div>

    <audio id="bg-audio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        // 1. BG ANIMATION
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = Array.from({length: 50}, () => ({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2, v: Math.random()*0.3}));
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = "#00d4ff";
            stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); s.y -= s.v; if(s.y < 0) s.y = canvas.height; });
            requestAnimationFrame(draw);
        }
        init(); draw(); window.onresize = init;

        // 2. LOGIC (Submit + Gallery)
        let data = JSON.parse(localStorage.getItem('mitzii_hub_v3')) || [];

        function publish() {
            const file = document.getElementById('g-file').files[0];
            const reader = new FileReader();

            const pushData = (img) => {
                const entry = {
                    name: document.getElementById('g-name').value,
                    link: document.getElementById('g-link').value,
                    cat: document.getElementById('g-cat').value,
                    desc: document.getElementById('g-desc').value,
                    img: img || 'https://cdn-icons-png.flaticon.com/512/124/124034.png'
                };
                if(!entry.name || !entry.link) return alert("Fill required info!");
                data.unshift(entry);
                localStorage.setItem('mitzii_hub_v3', JSON.stringify(data));
                render(); toggleModal(false);
            };

            if(file) {
                reader.readAsDataURL(file);
                reader.onload = () => pushData(reader.result);
            } else { pushData(); }
        }

        function render() {
            document.getElementById('main-grid').innerHTML = data.map((item, i) => `
                <div class="card">
                    <span class="delete-btn" onclick="del(${i})">×</span>
                    <img src="${item.img}" class="card-img">
                    <div class="card-tag">${item.cat}</div>
                    <h3>${item.name}</h3>
                    <p>${item.desc}</p>
                    <a href="${item.link}" target="_blank" class="join-link">JOIN NOW</a>
                </div>
            `).join('');
        }

        function del(i) { data.splice(i, 1); localStorage.setItem('mitzii_hub_v3', JSON.stringify(data)); render(); }
        function toggleModal(s) { document.getElementById('modal').style.display = s ? 'flex' : 'none'; }

        // 3. AUDIO & HUD
        const audio = document.getElementById('bg-audio');
        let started = false;
        function initExperience() { if(!started) { audio.play(); document.getElementById('m-btn').innerText = "⏸"; document.getElementById('m-status').innerText = "STREAMING..."; started = true; } }
        function controlAudio() { if(audio.paused) { audio.play(); document.getElementById('m-btn').innerText = "⏸"; } else { audio.pause(); document.getElementById('m-btn').innerText = "▶"; } }

        setInterval(() => {
            const d = new Date();
            document.getElementById('clock').innerText = d.getHours().toString().padStart(2,'0')+":"+d.getMinutes().toString().padStart(2,'0');
            document.getElementById('ping').innerText = Math.floor(Math.random()*20+12)+"ms";
        }, 1000);

        render();
    </script>
</body>
</html>

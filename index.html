<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MITZII HUB | ELITE PROMOTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #3b82f6; /* Modern Blue */
            --bg: #050505;
            --surface: #111111;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; line-height: 1.6; }

        /* --- BACKGROUND ANIMATION --- */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.4; }

        /* --- TOP DASHBOARD --- */
        .dashboard {
            display: flex; justify-content: space-between; padding: 12px 5%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1); sticky; top: 0; z-index: 1000;
        }
        .dash-item { font-family: 'Orbitron', sans-serif; font-size: 10px; color: var(--accent); letter-spacing: 1px; }

        /* --- HEADER --- */
        header { text-align: center; padding: 60px 20px; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 3rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 10px; }
        .logo span { color: var(--accent); }
        .subtitle { font-size: 14px; color: #666; text-transform: uppercase; letter-spacing: 4px; }

        /* --- ACTION BAR --- */
        .action-container { display: flex; justify-content: center; margin-bottom: 40px; }
        .btn-main {
            background: var(--accent); color: white; padding: 15px 35px; border-radius: 50px;
            border: none; font-weight: 700; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(59, 130, 246, 0.5); }

        /* --- GRID & CARDS --- */
        .container { max-width: 1100px; margin: auto; padding: 0 20px; }
        .group-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        
        .card {
            background: var(--surface); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px; padding: 25px; position: relative;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeIn 0.5s ease forwards;
        }
        .card:hover { border-color: var(--accent); background: #161616; transform: scale(1.02); }
        
        .card-img { width: 60px; height: 60px; border-radius: 15px; background: #222; margin-bottom: 15px; object-fit: cover; }
        .card-cat { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; display: block; }
        .card h3 { margin-bottom: 10px; font-size: 1.2rem; }
        .card p { font-size: 13px; color: #888; margin-bottom: 20px; height: 40px; overflow: hidden; }

        .btn-join { display: inline-block; width: 100%; text-align: center; padding: 10px; background: #222; color: white; text-decoration: none; border-radius: 10px; font-weight: 600; font-size: 13px; }
        .btn-join:hover { background: var(--accent); }

        .btn-delete {
            position: absolute; top: 15px; right: 15px; background: none; border: none;
            color: #444; cursor: pointer; font-size: 18px; transition: 0.3s;
        }
        .btn-delete:hover { color: #ff4444; }

        /* --- MODAL --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; display: none;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-box { background: #0a0a0a; border: 1px solid var(--accent); padding: 30px; border-radius: 24px; width: 100%; max-width: 450px; }
        input, select, textarea { width: 100%; padding: 14px; margin-bottom: 15px; background: #181818; border: 1px solid #222; color: white; border-radius: 12px; outline: none; }
        input:focus { border-color: var(--accent); }

        /* --- MUSIC PLAYER --- */
        .player-dock {
            position: fixed; bottom: 30px; right: 30px; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 20px; border-radius: 50px; display: flex; align-items: center; gap: 15px;
        }
        .play-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .track-info { font-size: 11px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onclick="initAudio()">

    <canvas id="bg-canvas"></canvas>

    <div class="dashboard">
        <div>
            <span class="dash-item">LATENCY: <span id="ping">--</span></span>
            <span class="dash-item" style="margin-left: 20px;">SYSTEM: <span id="clock">00:00</span></span>
        </div>
        <span class="dash-item">ENCRYPTED CONNECTION</span>
    </div>

    <header>
        <h1 class="logo">MITZII <span>HUB</span></h1>
        <div class="subtitle">Premium Community Directory</div>
    </header>

    <div class="container">
        <div class="action-container">
            <button class="btn-main" onclick="toggleModal(true)">+ ADD NEW COMMUNITY</button>
        </div>

        <div class="group-grid" id="group-list">
            </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-box">
            <h2 style="margin-bottom: 20px;">SUBMIT GROUP</h2>
            <input type="text" id="in-name" placeholder="Name">
            <input type="url" id="in-link" placeholder="Invite Link">
            <input type="url" id="in-img" placeholder="Logo Image URL (Optional)">
            <select id="in-cat">
                <option>CHAT GROUP</option>
                <option>ENTERTAINMENT</option>
                <option>TECHNOLOGY</option>
                <option>EDUCATION</option>
            </select>
            <textarea id="in-desc" rows="3" placeholder="Brief description..."></textarea>
            <button class="btn-main" style="width: 100%;" onclick="saveGroup()">PUBLISH NOW</button>
            <button onclick="toggleModal(false)" style="background:none; border:none; color:#555; width:100%; margin-top:15px; cursor:pointer;">CANCEL</button>
        </div>
    </div>

    <div class="player-dock">
        <button class="play-btn" onclick="togglePlay()" id="play-trigger">▶</button>
        <div class="track-info">
            <div style="font-weight: 800; color: var(--accent);">SINHALA MIX</div>
            <div id="status">CLICK TO PLAY</div>
        </div>
    </div>

    <audio id="bg-audio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- 1. CLEAN BACKGROUND ANIMATION ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let points = [];

        function initBG() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<50; i++) points.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2, v: Math.random()*0.5});
        }
        function drawBG() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "#3b82f6";
            points.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                p.y -= p.v; if(p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(drawBG);
        }
        window.onresize = initBG; initBG(); drawBG();

        // --- 2. FUNCTIONAL LOGIC (CRUD) ---
        let groups = JSON.parse(localStorage.getItem('mitzii_groups')) || [];

        function renderGroups() {
            const list = document.getElementById('group-list');
            list.innerHTML = groups.map((g, index) => `
                <div class="card">
                    <button class="btn-delete" onclick="deleteGroup(${index})">×</button>
                    <img src="${g.img || 'https://cdn-icons-png.flaticon.com/512/124/124034.png'}" class="card-img">
                    <span class="card-cat">${g.cat}</span>
                    <h3>${g.name}</h3>
                    <p>${g.desc}</p>
                    <a href="${g.link}" target="_blank" class="btn-join">JOIN COMMUNITY</a>
                </div>
            `).join('');
        }

        function saveGroup() {
            const newGroup = {
                name: document.getElementById('in-name').value,
                link: document.getElementById('in-link').value,
                img: document.getElementById('in-img').value,
                cat: document.getElementById('in-cat').value,
                desc: document.getElementById('in-desc').value
            };
            if(!newGroup.name || !newGroup.link) return alert("Fill required fields!");
            groups.unshift(newGroup);
            localStorage.setItem('mitzii_groups', JSON.stringify(groups));
            renderGroups();
            toggleModal(false);
        }

        function deleteGroup(index) {
            groups.splice(index, 1);
            localStorage.setItem('mitzii_groups', JSON.stringify(groups));
            renderGroups();
        }

        function toggleModal(show) { document.getElementById('modal').style.display = show ? 'flex' : 'none'; }

        // --- 3. AUDIO FIX ---
        const audio = document.getElementById('bg-audio');
        let audioStarted = false;

        function initAudio() {
            if(!audioStarted) {
                audio.play().catch(() => console.log("User must interact first"));
                document.getElementById('play-trigger').innerText = "⏸";
                document.getElementById('status').innerText = "NOW PLAYING";
                audioStarted = true;
            }
        }

        function togglePlay() {
            if(audio.paused) { audio.play(); document.getElementById('play-trigger').innerText = "⏸"; }
            else { audio.pause(); document.getElementById('play-trigger').innerText = "▶"; }
        }

        // --- 4. LIVE DASHBOARD ---
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
            document.getElementById('ping').innerText = Math.floor(Math.random() * 30 + 10) + "ms";
        }, 1000);

        renderGroups();
    </script>
</body>
</html>
